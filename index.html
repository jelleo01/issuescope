<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IssueScope — 토픽 이슈 분석 엔진</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#F6F4EF; --bgc:#FFFFFF; --bgs:#EEECE7;
  --t1:#0F1923; --t2:#4A5568; --t3:#8A95A3;
  --ac:#0040CC; --ach:#002EA8; --acl:rgba(0,64,204,0.09);
  --bdr:#E2DDD5; --bdr2:#C8C2B8;
  --shd:0 1px 3px rgba(15,25,35,0.07);
  --shd2:0 4px 16px rgba(15,25,35,0.1);
  --r8:8px; --r12:12px; --r14:14px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#111820; --bgc:#1A2332; --bgs:#202C3D;
    --t1:#EEF2F7; --t2:#8DA5BC; --t3:#5A7A96;
    --bdr:#2A3B4E; --bdr2:#3A4F65;
    --acl:rgba(0,64,204,0.18);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}
::selection{background:var(--acl);color:var(--ac)}
a{color:var(--ac);text-decoration:none}
a:hover{text-decoration:underline}

/* ── NAV ── */
.nav{
  display:flex;align-items:center;gap:14px;
  padding:10px 28px;
  border-bottom:1px solid var(--bdr);
  background:rgba(246,244,239,.92);
  backdrop-filter:blur(12px);
  position:sticky;top:0;z-index:100;
}
@media(prefers-color-scheme:dark){.nav{background:rgba(17,24,32,.92)}}
.logo{font-family:'Fraunces',serif;font-size:17px;font-weight:700;color:var(--ac);cursor:pointer;letter-spacing:-.02em;flex-shrink:0}
.nav-sep{width:1px;height:18px;background:var(--bdr);flex-shrink:0}
.nav-search-wrap{display:flex;flex:1;max-width:420px;background:var(--bgc);border:1.5px solid var(--bdr);border-radius:var(--r8);overflow:hidden;transition:border-color .15s,box-shadow .15s}
.nav-search-wrap:focus-within{border-color:var(--ac);box-shadow:0 0 0 3px var(--acl)}
.nav-input{flex:1;padding:7px 12px;border:none;outline:none;font-size:13px;color:var(--t1);background:transparent;font-family:'DM Sans',sans-serif}
.nav-btn{padding:5px 11px;background:var(--ac);color:#fff;border:none;cursor:pointer;font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;margin:2.5px;border-radius:5px;transition:background .15s;white-space:nowrap}
.nav-btn:hover{background:var(--ach)}
.nav-meta{display:flex;align-items:center;gap:10px;margin-left:auto}
.nav-count{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace}
.api-toggle{padding:4px 10px;background:transparent;border:1px solid var(--bdr2);border-radius:100px;font-size:11px;color:var(--t2);cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .15s}
.api-toggle:hover{border-color:var(--ac);color:var(--ac)}

/* API KEY DRAWER */
.api-drawer{
  display:none;padding:10px 28px;
  background:var(--bgs);border-bottom:1px solid var(--bdr);
}
.api-drawer.open{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.api-label{font-size:12px;color:var(--t2);font-family:'DM Mono',monospace;white-space:nowrap}
.api-input{flex:1;max-width:380px;padding:6px 12px;border:1.5px solid var(--bdr);border-radius:var(--r8);font-size:12px;color:var(--t1);background:var(--bgc);font-family:'DM Mono',monospace;outline:none;transition:border-color .15s}
.api-input:focus{border-color:var(--ac)}
.api-hint{font-size:11px;color:var(--t3);line-height:1.5}

/* ── HOME ── */
#home-page{
  min-height:calc(100vh - 53px);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:48px 24px;
  text-align:center;
}
.eyebrow{
  display:inline-flex;align-items:center;gap:7px;
  background:var(--acl);border:1px solid rgba(0,64,204,.2);
  border-radius:100px;padding:4px 14px;margin-bottom:22px;
}
.eyebrow-dot{width:7px;height:7px;border-radius:50%;background:var(--ac);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.eyebrow-txt{font-size:11px;color:var(--ac);font-family:'DM Mono',monospace;letter-spacing:.05em}
.home-h1{font-family:'Fraunces',serif;font-size:clamp(28px,5vw,48px);font-weight:300;line-height:1.15;letter-spacing:-.03em;color:var(--t1);margin-bottom:5px}
.home-h1-em{font-weight:700;color:var(--ac);font-style:italic}
.home-sub{font-size:15px;color:var(--t2);line-height:1.7;margin:14px 0 28px;max-width:440px;font-weight:300}
.home-search-wrap{
  display:flex;width:100%;max-width:580px;
  background:var(--bgc);
  border:2px solid var(--bdr);border-radius:var(--r14);
  overflow:hidden;margin-bottom:16px;
  transition:border-color .15s,box-shadow .15s;
  box-shadow:var(--shd);
}
.home-search-wrap:focus-within{border-color:var(--ac);box-shadow:0 0 0 4px var(--acl),var(--shd2)}
.home-input{flex:1;padding:14px 18px;border:none;outline:none;font-size:15px;color:var(--t1);background:transparent;font-family:'DM Sans',sans-serif}
.home-search-wrap::placeholder{color:var(--t3)}
.home-search-btn{
  padding:10px 20px;background:var(--ac);color:#fff;
  border:none;cursor:pointer;font-size:14px;font-weight:600;
  font-family:'DM Sans',sans-serif;margin:4px;
  border-radius:10px;transition:background .15s;white-space:nowrap;
}
.home-search-btn:hover{background:var(--ach)}
.examples{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;align-items:center}
.ex-label{font-size:12px;color:var(--t3);flex-shrink:0}
.ex-btn{
  padding:5px 14px;background:transparent;
  border:1.5px solid var(--bdr);border-radius:100px;
  font-size:12px;color:var(--t2);cursor:pointer;
  font-family:'DM Sans',sans-serif;transition:all .12s;
}
.ex-btn:hover{border-color:var(--ac);color:var(--ac);background:var(--acl)}
.home-footer{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  display:flex;gap:20px;font-size:11px;color:var(--t3);white-space:nowrap;
}

/* ── RESULTS ── */
#results-page{display:none}
.results-header{padding:14px 28px 8px}
.qmeta{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:2px}
.q-label{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase}
.q-keyword{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:var(--ac);font-style:italic;letter-spacing:-.02em}
.q-time{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace}
.sort-bar{display:flex;align-items:center;gap:8px;margin:8px 0}
.sort-label{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace}
.sort-btn{padding:4px 12px;border:1.5px solid var(--bdr);border-radius:var(--r8);font-size:12px;color:var(--t2);cursor:pointer;background:transparent;font-family:'DM Sans',sans-serif;transition:all .12s}
.sort-btn.active{background:var(--ac);color:#fff;border-color:var(--ac)}

/* ── TWO COL ── */
.two-col{display:grid;grid-template-columns:minmax(0,1fr) 340px;gap:16px;padding:0 28px 40px;align-items:start}
@media(max-width:900px){.two-col{grid-template-columns:1fr}.col-right{position:static!important}}
.col-right{position:sticky;top:73px;max-height:calc(100vh - 90px);overflow-y:auto}

/* ── ARTICLE CARDS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{opacity:.5}100%{opacity:1}}
.a-card{
  background:var(--bgc);border:1.5px solid var(--bdr);border-radius:var(--r12);
  padding:13px 15px;margin-bottom:8px;cursor:pointer;
  transition:border-color .15s,box-shadow .15s,transform .15s;
  animation:fadeUp .35s ease both;
}
.a-card:hover{border-color:var(--bdr2);box-shadow:var(--shd2);transform:translateY(-1px)}
.a-card.sel{border-color:var(--ac);border-width:2px;background:var(--acl);box-shadow:0 0 0 3px rgba(0,64,204,.1),var(--shd2)}
.ch{display:flex;align-items:flex-start;gap:9px;margin-bottom:7px}
.crank{min-width:21px;height:21px;border-radius:5px;background:var(--bgs);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--t3);font-family:'DM Mono',monospace;flex-shrink:0;margin-top:1px;transition:all .15s}
.crank.sel{background:var(--ac);color:#fff}
.ctitle{font-size:13.5px;font-weight:600;line-height:1.45;color:var(--t1)}
.csnip{font-size:12px;color:var(--t2);line-height:1.65;margin:0 0 9px 30px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cfoot{display:flex;align-items:center;gap:7px;margin-left:30px;flex-wrap:wrap}
.csrc{font-size:11px;font-weight:600;color:var(--t1);font-family:'DM Mono',monospace}
.cdot{color:var(--bdr2);font-size:10px}
.ctime{font-size:11px;color:var(--t3)}
.csp{flex:1;min-width:8px}
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:.01em}
.t-market{background:#DBEAFE;color:#1E40AF}
.t-legal{background:#FEE2E2;color:#991B1B}
.t-policy{background:#FEF3C7;color:#92400E}
.t-company{background:#EDE9FE;color:#5B21B6}
.t-finance{background:#D1FAE5;color:#065F46}
.t-controversy{background:#FFE4E6;color:#9F1239}
@media(prefers-color-scheme:dark){
  .t-market{background:#1E3A5F;color:#93C5FD}
  .t-legal{background:#4A1818;color:#FCA5A5}
  .t-policy{background:#3D2E00;color:#FCD34D}
  .t-company{background:#2D1B69;color:#C4B5FD}
  .t-finance{background:#064E3B;color:#6EE7B7}
  .t-controversy{background:#4C0519;color:#FDA4AF}
}
.score-pill{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:100px;background:var(--bgs)}
.sbw{width:26px;height:3px;background:var(--bdr);border-radius:2px;overflow:hidden}
.sbf{height:100%;border-radius:2px;background:var(--ac)}
.sct{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace}
.ext-link{font-size:11px;color:var(--ac);margin-left:auto;padding:2px 6px;border-radius:4px;transition:background .12s}
.ext-link:hover{background:var(--acl);text-decoration:none}

/* ── PANEL ── */
.panel-lbl-bar{font-size:11px;color:var(--t3);font-family:'DM Mono',monospace;letter-spacing:.06em;text-transform:uppercase;margin-bottom:9px;height:18px}
.panel-summ{background:var(--ac);border-radius:var(--r14);padding:14px 16px;margin-bottom:11px;color:#fff}
.ps-lbl{font-size:10px;opacity:.7;font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.ps-text{font-size:12.5px;line-height:1.75;opacity:.95}
.iss-lbl{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:8px;margin-bottom:9px}
.iss-line{flex:1;height:.5px;background:var(--bdr)}
.iss-card{
  border-left:2.5px solid var(--ac);
  border-radius:0 var(--r8) var(--r8) 0;
  background:var(--bgc);
  border-right:1px solid var(--bdr);border-top:1px solid var(--bdr);border-bottom:1px solid var(--bdr);
  padding:10px 12px;margin-bottom:8px;
  transition:background .15s;
}
.iss-card:hover{background:var(--acl)}
.ih{display:flex;align-items:flex-start;gap:8px;margin-bottom:5px}
.inum{min-width:20px;height:20px;border-radius:5px;background:var(--acl);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:var(--ac);font-family:'DM Mono',monospace;flex-shrink:0}
.ititle{font-size:13px;font-weight:600;color:var(--t1);flex:1}
.sbadge{font-size:9px;font-weight:600;padding:1px 6px;border-radius:100px;flex-shrink:0;margin-top:2px}
.sh{background:#FEE2E2;color:#991B1B}.sm{background:#FEF3C7;color:#92400E}.sl{background:#D1FAE5;color:#065F46}
@media(prefers-color-scheme:dark){
  .sh{background:#4A1818;color:#FCA5A5}.sm{background:#3D2E00;color:#FCD34D}.sl{background:#064E3B;color:#6EE7B7}
}
.idesc{font-size:12px;color:var(--t2);line-height:1.65;margin:0 0 0 28px}
.ref-lbl{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.04em;margin:8px 0 4px 28px;display:block}
.ref-btn{display:block;width:calc(100% - 28px);margin-left:28px;margin-bottom:3px;padding:3px 9px;background:var(--bgs);border:none;border-radius:6px;font-size:11px;color:var(--t2);cursor:pointer;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'DM Sans',sans-serif;transition:all .12s}
.ref-btn:hover{background:var(--acl);color:var(--ac)}

/* ── DETAIL ── */
.back-btn{display:flex;align-items:center;gap:5px;background:transparent;border:1.5px solid var(--bdr);border-radius:var(--r8);padding:6px 12px;font-size:12px;color:var(--t2);cursor:pointer;margin-bottom:11px;font-family:'DM Sans',sans-serif;transition:all .12s}
.back-btn:hover{border-color:var(--ac);color:var(--ac)}
.d-box{background:var(--bgc);border:1.5px solid var(--bdr);border-radius:var(--r12);padding:12px 14px;margin-bottom:9px}
.d-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.d-src{font-size:12px;font-weight:700;font-family:'DM Mono',monospace;color:var(--t1)}
.d-time{font-size:11px;color:var(--t3)}
.d-title{font-size:14px;font-weight:700;color:var(--t1);line-height:1.5;margin-bottom:9px}
.d-link{font-size:11px;color:var(--ac);display:inline-flex;align-items:center;gap:3px}
.sec-lbl{font-size:10px;color:var(--t3);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:8px}
.b-item{display:flex;gap:8px;font-size:12.5px;color:var(--t1);line-height:1.65;padding:5px 0;border-bottom:1px solid var(--bgs)}
.b-item:last-child{border-bottom:none}
.b-num{color:var(--ac);font-weight:600;font-size:11px;font-family:'DM Mono',monospace;flex-shrink:0;margin-top:2px}
.rel-box{background:var(--acl);border:1px solid rgba(0,64,204,.18);border-radius:var(--r8);padding:10px 13px;margin-bottom:9px}
.rel-lbl{font-size:10px;color:var(--ac);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.06em;display:block;margin-bottom:5px}
.rel-text{font-size:12.5px;color:var(--t1);line-height:1.65}
.entity-wrap{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:3px 10px;background:var(--bgs);border-radius:100px;font-size:12px;color:var(--t1)}
.impl-item{display:flex;gap:7px;align-items:flex-start;margin-bottom:5px}
.impl-dot{width:5px;height:5px;border-radius:50%;background:#D97706;flex-shrink:0;margin-top:5px}
.impl-text{font-size:12px;color:var(--t2);line-height:1.65}
.tip{background:var(--bgs);border-radius:var(--r8);padding:10px 13px;font-size:11.5px;color:var(--t3);line-height:1.6;margin-top:9px}

/* ── SKELETON ── */
.skel{background:var(--bgs);border-radius:4px;animation:shimmer .8s ease infinite alternate}
.skel-card{background:var(--bgc);border:1.5px solid var(--bdr);border-radius:var(--r12);padding:13px 15px;margin-bottom:8px}

/* ── STATUS MESSAGES ── */
.status-box{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--r8);font-size:12px;margin-bottom:8px}
.status-loading{background:var(--acl);border:1px solid rgba(0,64,204,.2);color:var(--ac)}
.status-error{background:#FEE2E2;border:1px solid #FECACA;color:#991B1B}
.status-ok{background:#D1FAE5;border:1px solid #A7F3D0;color:#065F46}
@media(prefers-color-scheme:dark){
  .status-error{background:#4A1818;border-color:#7F1D1D;color:#FCA5A5}
  .status-ok{background:#064E3B;border-color:#065F46;color:#6EE7B7}
}
.spin{width:14px;height:14px;border:2px solid rgba(0,64,204,.3);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY / ERROR ── */
.empty-box{background:var(--bgc);border:1.5px solid var(--bdr);border-radius:var(--r12);padding:40px;text-align:center}
.empty-icon{font-size:32px;margin-bottom:12px}
.empty-txt{font-size:14px;color:var(--t2);line-height:1.7}
</style>
</head>
<body>

<!-- ─── NAV ─── -->
<nav class="nav" id="main-nav" style="display:none">
  <span class="logo" id="nav-logo">IssueScope</span>
  <div class="nav-sep"></div>
  <div class="nav-search-wrap">
    <input class="nav-input" id="nav-input" placeholder="다른 키워드 검색..." />
    <button class="nav-btn" id="nav-btn">검색</button>
  </div>
  <div class="nav-meta">
    <span class="nav-count" id="art-count"></span>
    <button class="api-toggle" id="api-toggle">⚙ API 키</button>
  </div>
</nav>

<!-- API KEY DRAWER -->
<div class="api-drawer" id="api-drawer">
  <span class="api-label">Claude API Key:</span>
  <input class="api-input" id="api-key-input" type="password" placeholder="sk-ant-..." />
  <div class="api-hint">분석 품질 향상용 (선택). 입력 시 Claude AI가 직접 이슈를 추출합니다.</div>
</div>

<!-- ─── HOME ─── -->
<div id="home-page">
  <div class="eyebrow">
    <div class="eyebrow-dot"></div>
    <span class="eyebrow-txt">실시간 이슈 분석</span>
  </div>
  <h1 class="home-h1">Let's see</h1>
  <h1 class="home-h1"><span class="home-h1-em">current issues</span></h1>
  <p class="home-sub">키워드를 입력하면 최신 뉴스를 수집·분석해<br>핵심 쟁점과 시사점을 즉시 추출합니다.</p>
  <div class="home-search-wrap">
    <input class="home-input" id="home-input" placeholder="검색할 키워드 — 예: 전환사채, AI 규제, 금리 인하" />
    <button class="home-search-btn" id="home-btn">분석하기 →</button>
  </div>
  <div class="examples">
    <span class="ex-label">예시:</span>
    <button class="ex-btn" data-q="전환사채">전환사채</button>
    <button class="ex-btn" data-q="공매도">공매도</button>
    <button class="ex-btn" data-q="AI 규제">AI 규제</button>
    <button class="ex-btn" data-q="의대 증원">의대 증원</button>
    <button class="ex-btn" data-q="금리 인하">금리 인하</button>
    <button class="ex-btn" data-q="비트코인 ETF">비트코인 ETF</button>
    <button class="ex-btn" data-q="삼성전자">삼성전자</button>
    <button class="ex-btn" data-q="신주인수권">신주인수권</button>
  </div>
  <div class="home-footer">
    <span>실시간 Google 뉴스 수집</span>
    <span>·</span>
    <span>AI 이슈 자동 추출</span>
    <span>·</span>
    <span>관련 기사 근거 제시</span>
  </div>
</div>

<!-- ─── RESULTS ─── -->
<div id="results-page">
  <div class="results-header">
    <div class="qmeta">
      <span class="q-label">현재 이슈</span>
      <span class="q-keyword" id="q-keyword"></span>
      <span class="q-time" id="q-time"></span>
    </div>

      <button class="sort-btn active" id="sort-rel">관련도순</button>

<script>
// ─── STATE ───
const S = { query:'', articles:[], issues:[], summary:'', sort:'relevance', selectedId:null };

// ─── TAG / SCORE HELPERS ───
const TAG_KW = {
  market:['주가','시장','코스피','코스닥','증시','투자','거래','수급','매수','매도','상장','ETF','지수'],
  legal:['법원','판결','소송','규정','위반','처벌','기소','판례','헌법','형사','민사'],
  policy:['정부','규제','금감원','금융위','당국','정책','법안','행정','개정','시행'],
  company:['기업','삼성','현대','SK','LG','카카오','네이버','대기업','스타트업','이사회','상장사'],
  finance:['금리','채권','주식','환율','달러','원화','CB','BW','사채','증권','대출','부채'],
  controversy:['논란','갈등','문제','비판','반발','우려','충돌','파장','쟁점','사태']
};
const TAG_LABELS = {market:'시장',legal:'법률',policy:'정책',company:'기업',finance:'금융',controversy:'논란'};
const TAG_CLASS  = {market:'t-market',legal:'t-legal',policy:'t-policy',company:'t-company',finance:'t-finance',controversy:'t-controversy'};

function inferTags(title, snip) {
  const txt = (title+' '+snip).toLowerCase();
  return Object.entries(TAG_KW).filter(([,kws])=>kws.some(k=>txt.includes(k.toLowerCase()))).map(([t])=>t).slice(0,2);
}
function scoreRelevance(title, snip, query) {
  const terms = query.trim().split(/\s+/);
  const txt = (title+' '+snip).toLowerCase();
  let s = 0.55;
  terms.forEach(t => {
    if (title.toLowerCase().includes(t.toLowerCase())) s += 0.25;
    if (snip.toLowerCase().includes(t.toLowerCase()))  s += 0.10;
  });
  return Math.min(s, 0.99);
}
function relTime(s) {
  if (!s) return '';
  const d = new Date(s), n = new Date();
  const h = Math.floor((n-d)/3600000), dy = Math.floor((n-d)/86400000);
  if (isNaN(h)) return '';
  if (h < 1)  return '방금 전';
  if (h < 24) return `${h}시간 전`;
  if (dy < 7) return `${dy}일 전`;
  return d.toLocaleDateString('ko-KR',{month:'long',day:'numeric'});
}
function renderTag(t) { return `<span class="tag ${TAG_CLASS[t]||'t-market'}">${TAG_LABELS[t]||t}</span>`; }
function setStatus(h) { document.getElementById('fetch-status').innerHTML = h||''; }

// ─── NEWS FETCH ───
function makeArticle(i, a, query) {
  const t = (a.title||'').trim();
  const snip = (a.description||a.content||'').replace(/<[^>]*>/g,'').trim().substring(0,320);
  const src = (a.source||(typeof a.source==='object'?a.source?.name:'')||'알 수 없음').toString().trim();
  let pub;
  try { pub = a.publishedAt ? new Date(a.publishedAt).toISOString() : new Date().toISOString(); } catch { pub = new Date().toISOString(); }
  return {
    id:`art_${i}`, title:t, source:src, url:a.url||a.link||'#',
    publishedAt:pub, snippet:snip,
    score: Math.max(scoreRelevance(t, snip, query) - i*0.005, 0.38),
    tags: inferTags(t, snip),
    bullets:null, rel:null, impl:null
  };
}

async function fetchRSSNews(query, maxItems=40) {
  const res = await fetch('/api/news?q=' + encodeURIComponent(query));
  if (!res.ok) throw new Error(`서버 오류 HTTP ${res.status}`);
  const d = await res.json();
  if (d.error && !(d.items?.length)) throw new Error(d.error);
  const items = (d.items || []).slice(0, maxItems);
  if (!items.length) throw new Error('검색 결과가 없습니다');
  return items.map((a, i) => makeArticle(i, a, query));
}

// ─── LOCAL ISSUE EXTRACTION ───
const KO_STOP = new Set(['이','가','을','를','은','는','에','의','로','와','과','등','및','대한','관련','통해','위한','것은','것을','하다','있다','없다','이번','지난','됩니다','밝혔다','따르면','이라고','이며','하여','되어','으로','에서','부터','까지']);
function tokenize(t) { return (t.match(/[가-힣a-zA-Z]{2,}/g)||[]).filter(w=>!KO_STOP.has(w)&&w.length>=2); }

const TAG_ISSUE = {
  market:'시장 반응 및 주가 영향', legal:'법적 분쟁 및 규제 위반',
  policy:'정책 및 규제 동향', company:'기업 동향 및 전략',
  finance:'금융 시장 및 자금 조달', controversy:'논란 및 사회적 갈등'
};
const TAG_SEV = {market:'medium',legal:'high',policy:'high',company:'medium',finance:'medium',controversy:'high'};

function extractLocalIssues(articles, query) {
  if (!articles?.length) return [];

  // 1) 태그 클러스터
  const tagGroups = {};
  articles.forEach(a => (a.tags||[]).forEach(tag => { (tagGroups[tag]||(tagGroups[tag]=[])).push(a); }));

  const tagIssues = Object.entries(tagGroups)
    .sort((a,b) => b[1].length - a[1].length).slice(0,3)
    .map(([tag, arts], i) => ({
      id:`tag${i}`, title: TAG_ISSUE[tag]||tag,
      desc: `${query} 관련 ${TAG_ISSUE[tag]||tag} 보도가 ${arts.length}건 있습니다.${arts[0]?.title ? ` "${arts[0].title.substring(0,40)}…" 등이 주요 기사입니다.` : ''}`,
      refs: arts.slice(0,3).map(a=>a.id), sev: TAG_SEV[tag]||'medium'
    }));

  // 2) 키워드 클러스터 (추가)
  const freq = {};
  articles.forEach(a => {
    tokenize(a.title).forEach(w => { freq[w]=(freq[w]||0)+2; });
    tokenize(a.snippet||'').forEach(w => { freq[w]=(freq[w]||0)+1; });
  });
  tokenize(query).forEach(w => delete freq[w]);
  const topWords = Object.entries(freq).filter(([,c])=>c>=2).sort((a,b)=>b[1]-a[1]).slice(0,15).map(([w])=>w);

  const kwIssues = [];
  for (const kw of topWords) {
    if (kwIssues.length >= 2) break;
    const ms = articles.filter(a => (a.title+' '+(a.snippet||'')).includes(kw));
    if (ms.length < 2) continue;
    const dup = tagIssues.some(ti => ms.filter(a=>ti.refs.includes(a.id)).length > ms.length*0.7);
    if (dup) continue;
    kwIssues.push({ id:`kw${kwIssues.length}`, title:`'${kw}' 집중 보도`,
      desc:`${query} 뉴스에서 '${kw}' 관련 보도가 ${ms.length}건 집중되고 있습니다.${ms[0]?.title ? ` "${ms[0].title.substring(0,40)}…" 등이 주요 기사입니다.` : ''}`,
      refs: ms.slice(0,3).map(a=>a.id), sev:'medium' });
  }

  const all = [...tagIssues, ...kwIssues].slice(0,5);

  // 3) 폴백: 기사 자체로 이슈 생성
  if (!all.length) {
    return articles.slice(0,3).map((a,i) => ({
      id:`fb${i}`, title: a.title.substring(0,30)+'…',
      desc: a.snippet ? a.snippet.substring(0,120)+'…' : '원문을 확인하세요.',
      refs:[a.id], sev: i===0?'high':'medium'
    }));
  }
  return all;
}

function buildLocalSummary(articles, query) {
  if (!articles?.length) return `'${query}' 관련 기사를 수집했습니다.`;
  const srcs = [...new Set(articles.slice(0,8).map(a=>a.source).filter(Boolean))].slice(0,4);
  const r24 = articles.filter(a => { try { return (new Date()-new Date(a.publishedAt))<86400000; } catch { return false; } }).length;
  const tagCount = {};
  articles.forEach(a => (a.tags||[]).forEach(t => { tagCount[t]=(tagCount[t]||0)+1; }));
  const topTag = Object.entries(tagCount).sort((a,b)=>b[1]-a[1])[0];
  const topTagLabel = {market:'시장/주가',legal:'법률/규제',policy:'정책',company:'기업동향',finance:'금융',controversy:'논란'}[topTag?.[0]]||'';
  return `'${query}'에 관한 최신 뉴스 ${articles.length}건이 수집됐습니다.`
    + (r24>0 ? ` 이 중 ${r24}건이 24시간 이내 보도입니다.` : '')
    + (topTagLabel ? ` 주요 보도 방향은 ${topTagLabel} 관련입니다.` : '')
    + (srcs.length ? ` ${srcs.join(', ')} 등에서 다루고 있습니다.` : '');
}

// ─── CLAUDE API ───
async function callClaude(prompt, apiKey) {
  const body = JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1500, messages:[{role:'user',content:prompt}] });
  const headers = { 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01' };
  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {method:'POST', headers, body});
    if (res.ok) return await res.json();
  } catch {}
  try {
    const res = await fetch('https://corsproxy.io/?'+encodeURIComponent('https://api.anthropic.com/v1/messages'), {method:'POST', headers, body});
    if (res.ok) return await res.json();
  } catch {}
  throw new Error('Claude API 호출 실패');
}

async function fetchClaudeIssues(query, articles, apiKey) {
  const txt = articles.slice(0,25).map(a=>`[${a.id}] "${a.title}" (${a.source})\n${a.snippet}`).join('\n\n');
  const ids = articles.slice(0,25).map(a=>a.id).join(', ');
  const prompt = `한국 뉴스 분석 전문가. "${query}" 키워드 최신 기사 ${Math.min(articles.length,25)}건:\n\n${txt}\n\nJSON만 반환 (마크다운 없이):\n{"overallSummary":"현황 2-3문장 요약. 구체적 수치·사실 포함","mainIssues":[{"id":"i1","title":"이슈 제목 20자 이내","desc":"구체적 사실 기반 2-3문장. 무슨 일이 왜 중요한지","refs":["기사id"],"sev":"high|medium|low"}]}\n기사ID: ${ids}\n한국어, 3-5개 이슈.`;
  const data = await callClaude(prompt, apiKey);
  const text = (data.content||[]).find(c=>c.type==='text')?.text||'';
  const parsed = JSON.parse(text.replace(/```json|```/g,'').trim());
  return {
    summary: parsed.overallSummary||'',
    issues: (parsed.mainIssues||[]).map(x=>({id:x.id,title:x.title,desc:x.desc||x.description,refs:x.refs||[],sev:x.sev||'medium'}))
  };
}

async function fetchClaudeDetail(article, query, apiKey) {
  const prompt = `기사 분석. 검색 주제: "${query}"\n제목: ${article.title}\n내용: ${article.snippet}\n\nJSON만 (마크다운 없이):\n{\n"bullets":["핵심 내용 4-5개. 구체적 사실·수치·주체 포함. 무슨 일이 있었는지 서술."],\n"rel":"'${query}'와 구체적으로 어떻게 연관되는지 1-2문장. 키워드 언급 표현 절대 금지. 실제 인과관계·영향 메커니즘 서술.",\n"impl":["시사점 또는 향후 전망 2-3개. 구체적으로."]\n}\n한국어.`;
  const data = await callClaude(prompt, apiKey);
  const text = (data.content||[]).find(c=>c.type==='text')?.text||'';
  return JSON.parse(text.replace(/```json|```/g,'').trim());
}

  <div class="ch"><div class="crank${sel?' sel':''}">${i+1}</div><div class="ctitle">${a.title}</div></div>

    <span class="csrc">${a.source}</span><span class="cdot">•</span><span class="ctime">${relTime(a.publishedAt)}</span>
    <span class="csp"></span>${a.tags.slice(0,2).map(renderTag).join('')}
    <div class="score-pill"><div class="sbw"><div class="sbf" style="width:${sp}%"></div></div><span class="sct">${sp}%</span></div>

// ─── RENDER: ARTICLE DETAIL ───
async function showArticleDetail(a) {
  const apiKey = document.getElementById('api-key-input').value.trim();
  if (a.bullets) { renderDetailPanel(a); return; }
  if (apiKey) {
    document.getElementById('right-panel').innerHTML = `<button class="back-btn" id="back-btn">← 전체 이슈로 돌아가기</button><div class="status-box status-loading"><div class="spin"></div>Claude가 분석 중...</div>`;
    document.getElementById('back-btn').addEventListener('click', doBack);
    try {
      const d = await fetchClaudeDetail(a, S.query, apiKey);
      a.bullets = d.bullets||[]; a.rel = d.rel||''; a.impl = d.impl||[];
    } catch { a.bullets=[a.snippet||'']; a.rel=''; a.impl=[]; }
  } else {
    // API 키 없으면 snippet 문장 분리
    const snip = a.snippet||'';
    const sents = snip.split(/(?<=[.!?。])\s+/).filter(s=>s.length>15).slice(0,4);
    a.bullets = sents.length>=2 ? sents : (snip?[snip]:[]);
    a.rel=''; a.impl=[];
  }
  renderDetailPanel(a);
}

  document.getElementById('right-panel').innerHTML = `

</div>` : `<div class="d-box"><div style="font-size:13px;color:var(--t2);line-height:1.7">${a.snippet||'내용 없음'}</div></div>`}
${a.rel ? `<div class="rel-box"><span class="rel-lbl">이 기사와 "${S.query}"의 연관성</span><div class="rel-text">${a.rel}</div></div>` : ''}
${a.impl?.length ? `<div class="d-box"><span class="sec-lbl">시사점</span>${a.impl.map(i=>`<div class="impl-item"><div class="impl-dot"></div><div class="impl-text">${i}</div></div>`).join('')}</div>` : ''}
${a.url&&a.url!=='#'?`<a class="d-link" href="${a.url}" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--ac);margin-top:4px">원문 보기 ↗</a>`:''}`;

function doBack() {

  renderArticleCards();

// ─── MAIN SEARCH ───
async function loadResults(query) {
  query = query.trim(); if (!query) return;
  S.query=query; S.articles=[]; S.issues=[]; S.summary=''; S.selectedId=null; S.sort='relevance';
  document.getElementById('home-page').style.display='none';
  document.getElementById('results-page').style.display='block';
  document.getElementById('main-nav').style.display='flex';
  document.getElementById('nav-input').value=query;
  document.getElementById('q-keyword').textContent=`"${query}"`;
  document.getElementById('q-time').textContent=`— ${new Date().toLocaleString('ko-KR',{month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'})} 기준`;
  document.getElementById('art-count').textContent='';
  document.getElementById('sort-rel').className='sort-btn active';
  document.getElementById('sort-date').className='sort-btn';
  document.getElementById('panel-lbl').textContent='핵심 이슈 분석';
  renderSkeletonCards(8); renderIssueSkeleton();
  setStatus(`<div class="status-box status-loading"><div class="spin"></div>뉴스 수집 중...</div>`);
  const apiKey = document.getElementById('api-key-input').value.trim();

  try {
    S.articles = await fetchRSSNews(query, 40);
    document.getElementById('art-count').textContent=`${S.articles.length}개 기사`;
    setStatus(''); renderArticleCards();
  } catch(e) {
    setStatus(`<div class="status-box status-error">⚠ ${e.message} <button onclick="loadResults('${query.replace(/'/g,"\\'")}'); " style="margin-left:10px;padding:3px 10px;background:#991B1B;color:#fff;border:none;border-radius:5px;cursor:pointer;font-size:11px">↺ 재시도</button></div>`);
    document.getElementById('articles-container').innerHTML=''; return;
  }

  if (apiKey) {
    setStatus(`<div class="status-box status-loading"><div class="spin"></div>Claude AI 이슈 분석 중...</div>`);
    try {
      const r = await fetchClaudeIssues(query, S.articles, apiKey);
      S.summary=r.summary; S.issues=r.issues;
      setStatus(`<div class="status-box status-ok">✓ Claude AI 분석 완료 — ${S.issues.length}개 이슈 추출</div>`);
      setTimeout(()=>setStatus(''), 3000);
    } catch(e) {
      setStatus(''); S.issues=extractLocalIssues(S.articles, query); S.summary=buildLocalSummary(S.articles, query);
    }
  } else {
    S.issues=extractLocalIssues(S.articles, query); S.summary=buildLocalSummary(S.articles, query);
  }
  renderIssuePanel();
}

// ─── EVENT LISTENERS ───
function goHome() {
  document.getElementById('results-page').style.display='none';
  document.getElementById('home-page').style.display='flex';
  document.getElementById('main-nav').style.display='none';
  document.getElementById('api-drawer').classList.remove('open');
}
document.getElementById('home-btn').addEventListener('click', ()=>loadResults(document.getElementById('home-input').value));
document.getElementById('home-input').addEventListener('keydown', e=>{ if(e.key==='Enter') loadResults(e.target.value); });
document.querySelectorAll('.ex-btn').forEach(b=>b.addEventListener('click',()=>loadResults(b.dataset.q)));
document.getElementById('nav-logo').addEventListener('click', goHome);
document.getElementById('nav-btn').addEventListener('click', ()=>loadResults(document.getElementById('nav-input').value));
document.getElementById('nav-input').addEventListener('keydown', e=>{ if(e.key==='Enter') loadResults(e.target.value); });
document.getElementById('sort-rel').addEventListener('click', ()=>{ S.sort='relevance'; document.getElementById('sort-rel').className='sort-btn active'; document.getElementById('sort-date').className='sort-btn'; renderArticleCards(); });
document.getElementById('sort-date').addEventListener('click', ()=>{ S.sort='date'; document.getElementById('sort-date').className='sort-btn active'; document.getElementById('sort-rel').className='sort-btn'; renderArticleCards(); });
document.getElementById('api-toggle').addEventListener('click', ()=>document.getElementById('api-drawer').classList.toggle('open'));
</script>
